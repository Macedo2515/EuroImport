<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registo - Euroimport Motors</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="../CSS/login.css">
</head>
<body>

    <header>
        <div class="container">
            <div class="logo">
                <img src="../IMG/Logo.png" alt="Logótipo Euroimport Motors">
            </div>
            <nav>
                <ul>
                    <li><a href="../index.html">PÁGINA INICIAL</a></li>
                    <li><a href="servicos.html">SERVIÇOS</a></li>
                    <li><a href="veiculos.html">VEÍCULOS</a></li>
                    <li><a href="sobre.html">SOBRE NÓS</a></li>
                    <li><a href="contactos.html">CONTACTOS</a></li>
                    <li><a href="login.html">ENTRAR / REGISTAR</a></li>
                </ul>
            </nav>
            <a href="proposta.html" class="btn btn-primary">Pedir Proposta</a>
        </div>
    </header>

    <section class="login-section">
        <div class="login-sidebar">
            <h2>Criar Conta</h2>

            <form action="/register" method="POST">
                <div class="input-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="nome" required>
                </div>

                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" required>
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    <span class="icon">📝</span> Registar
                </button>

                <div class="register-link" style="margin-top: 15px;">
                    <a href="login.html">Já tens conta? Faz login aqui!</a>
                </div>
            </form>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="footer-logo">
                <img src="../IMG/Logo_rodape.png" alt="Logótipo Euroimport Motors" class="logo-footer">
            </div>
            <ul class="footer-links">
                <li><a href="../index.html">PÁGINA INICIAL</a></li>
                <li><a href="servicos.html">SERVIÇOS</a></li>
                <li><a href="veiculos.html">VEÍCULOS</a></li>
                <li><a href="sobre.html">SOBRE NÓS</a></li>
                <li><a href="contactos.html">CONTACTOS</a></li>
            </ul>
            <div class="footer-socials">
                <a href="#" target="_blank"><img src="../IMG/insta.png" alt="Instagram"></a>
                <a href="#" target="_blank"><img src="../IMG/face.png" alt="Facebook"></a>
                <a href="#" target="_blank"><img src="../IMG/whats.png" alt="Whatsapp"></a>
            </div>
        </div>
    </footer>

</body>
</html>
